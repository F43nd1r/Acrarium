name: tests

on: [ push ]

jobs:
  tests:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: [ '21' ]
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v5.4.0
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}
      - name: Tests on Java ${{ matrix.java }}
        uses: burrunan/gradle-cache-action@v3.0.2
        with:
          job-id: jdk${{ matrix.java }}
          arguments: test
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: Unit Test Results (Java ${{ matrix.java }})
          path: acrarium/build/test-results/**/*.xml

  publish-test-results:
    name: "Publish Unit Tests Results"
    needs: tests
    runs-on: ubuntu-latest
    # the build-and-test job might be skipped, we don't need to run this job then
    if: success() || failure()

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: artifacts
      - name: Publish Unit Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2.23.0
        with:
          files: artifacts/**/*.xml
